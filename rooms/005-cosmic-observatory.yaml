items:
  - name: Celestial Atlas
    description: >
      A beautifully illustrated atlas whose constellations rearrange themselves
      each time you open it. One unnamed star pulses softly, as if waiting for
      someone to discover it.

monster:
  name: The Celestial Watcher
  greeting: >
    For centuries I have watched adventurers seek gold, glory, and power.
    You are the first to pause and admire the stars.
    Perhaps your journey will end differently.
  difficulty: 2

easter_egg: >
  Type "look through telescope" to glimpse a constellation that perfectly mirrors
  the dungeon below.

author: adarsh-singh01