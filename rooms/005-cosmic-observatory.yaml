id: 005-cosmic-observatory

title: The Observatory Beyond the Ceiling

description: >
  The dungeon simply... ends.
  Where cold stone should seal the chamber, an endless universe stretches overhead,
  alive with drifting nebulae, impossible constellations, and galaxies that move
  ever so slightly when you're not looking directly at them. An ancient brass
  telescope slowly turns on its own, tracking your every step without making a
  sound. Resting beneath it is a weathered bronze plaque engraved with the words:
  "Built by Adarsh, who believed every mystery begins with looking up."

exits:
  west: 003-mighty-dragon
  up: TODO-event-horizon

