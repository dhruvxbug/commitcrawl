id: 006-library-of-lies
title: The Library of Lies

description: >
  Shelves stretch into darkness, crammed with books whose titles actively
  insult you. "Honest Politicians: A Complete Collection" (all pages blank).
  "The Ocean is Dry" (just a picture of a desert). "101% Accurate Riddles."
  A single leather-bound book glows faintly on a pedestal at the center.
  A stone alcove shaped like an open book is set into the north wall.

exits:
  east: 000-entrance
  north: TODO-shattered-sanctum

items:
  - name: Riddle Book
    description: >
      You open it. Inside, a single line:
      "I have words but never speak. What am I?"
      The rest is blank. On the last page, someone scrawled:
      "Place me in the alcove. The answer is also the key."

