puzzle:
  locked_exit: north
  description: >
    A stone alcove shaped like an open book. An inscription reads:
    "Speak the answer with your hands."
  question: "What has words but never speaks?"
  answer: book
  success_msg: >
    The alcove glows. The book sinks into the stone, and the wall
    grinds open, revealing a passage northward. (go north)
difficulty: 4

easter_egg: >
  Check the Riddle Book to read the riddle. Take it, then place it
  in the alcove to unlock the north exit.

author: dhruvxbug
