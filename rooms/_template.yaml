# Copy this file to rooms/NNN-your-room-name.yaml and fill it in.
# NNN = next free 3-digit number. Delete these comments when done.

id: NNN-your-room-name          # must match the filename (without .yaml)
title: A Short Punchy Title
description: >
  What does the player see, hear, smell when they walk in? Two or three
  sentences is plenty. Make it weird.

# Directions can be: north, south, east, west, up, down, in, out
# Point to an existing room's id, or a TODO-something id to leave a locked door.
exits:
  south: 000-entrance

# Optional — delete if not used. Any small ASCII art, a few lines tall is plenty.
# Ask any AI chat tool for "ascii art of X" if you're not into drawing it by hand.
ascii_art: |
      /\
     /  \
    /----\
   /      \

# Optional — delete if not used. A URL to a real image (only shown in the
# web viewer, not the terminal game). If both image and ascii_art are set,
# image wins.
# image: https://i.imgur.com/example.png

# Optional — delete if not used
items:
  - name: A Suspicious Item
    description: One line about what it does or looks like.
    on_use: (Optional) Text to display when a player types 'use <item>'
    consumable: true     # (Optional) If true, the item is removed from inventory after use

# Optional — delete if not used
monster:
  name: Something Scary Or Not
  greeting: What it says when you meet it.
  difficulty: 1        # 1 (harmless) to 5 (yikes)

# Optional — delete if not used
puzzle:
  locked_exit: direction
  description: "Text shown when trying to use the locked exit."
  question: "Question asked to prompt the user to use the 'place <item>' command."
  answer: Correct Answer
  success_msg: "Text shown when solved."

# Optional — delete if not used
easter_egg: A hidden interaction, like "say the password to get a reward."

author: your-github-handle
