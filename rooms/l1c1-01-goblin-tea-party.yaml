id: l1c1-01-goblin-tea-party
title: The Goblin Tea Party
description: >
  Three goblins sit around a comically small table, teacups trembling in
  their claws. They freeze mid-sip and stare at you like you've interrupted
  something extremely important.
ascii_art: |
    (\___/)  (\___/)  (\___/)
    ( o.o )  ( ^.^ )  ( -.- )
    c(")(") c(")(") c(")(")
        ~ tea time ~  
exits:
  south: l1c1-00-entrance
  west: l1c1-02-mirror-maze
monster:
  name: Goblin King (mid-sip)
  greeting: "WHO DARES DISTURB THE TEA?"
  difficulty: 2
items:
  - name: Chipped Teacup
    description: Empty. You get the feeling it was never really about the tea.
easter_egg: Say "sugar" three times and one goblin offers you a biscuit.
author: dexter-ifti
