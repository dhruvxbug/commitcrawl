id: l1c1-05-dark-corridor
title: The Dark Corridor
description: >
  The light from the entrance barely reaches this part of the dungeon. It smells
  like old parchment and regrets. The path abruptly ends at a solid stone wall.
exits:
  west: l1c1-00-entrance
  down: TODO-l1c1-06-hidden-basement
items:
  - name: Dusty Torch
    description: It's unlit and completely useless without flint.
    on_use: You manage to spark the torch to life. The sudden light reveals a hidden trapdoor to the basement! But suddenly, a swarm of bats attacks your face and you fall down!
author: Yashwanth137
